<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-card text-center">
    <h3 class="fw-bold mb-4">Film Arşivi Giriş</h3>
    <div th:if="${param.error}" class="alert alert-danger p-2 small">Hatalı kullanıcı adı veya şifre!</div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Şifre</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Giriş Yap</button>
    </form>
</div>
</body>
</html>
