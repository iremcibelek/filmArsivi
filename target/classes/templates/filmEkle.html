<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Film Yönetimi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 50px auto; padding: 40px; }
    </style>
</head>
<body>
<div class="form-card">
    <h2 class="text-center fw-bold mb-4">🎬 Film Bilgileri</h2>
    <form th:action="@{/kaydet}" th:object="${film}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label fw-bold">Film Adı</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Yönetmen</label>
                <input type="text" th:field="*{director}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Kategori</label>
                <select th:field="*{genre}" class="form-select">
                    <option value="Aksiyon">Aksiyon</option>
                    <option value="Drama">Drama</option>
                    <option value="Bilim Kurgu">Bilim Kurgu</option>
                    <option value="Diğer">Diğer</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Yayın Yılı</label>
            <input type="number" th:field="*{year}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Film Özeti</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">Afiş Seç (Boş bırakırsan eskisi kalır)</label>
            <input type="file" name="resimDosyasi" class="form-control">
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary fw-bold py-2">Kaydet</button>
            <a href="/" class="btn btn-light fw-bold">Vazgeç</a>
        </div>
    </form>
</div>
</body>
</html>
