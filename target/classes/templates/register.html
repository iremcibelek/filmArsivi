<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Film Arşivi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .register-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-warning { background-color: #ffc107; border: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="register-card text-center">
    <h3 class="fw-bold mb-4">Yeni Hesap Oluştur</h3>

    <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Kullanıcı Adı</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Kullanıcı adı seçin" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Şifre</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Şifrenizi girin" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Şifre Tekrar</label>
            <input type="password" name="confirmPassword" class="form-control" placeholder="Şifrenizi tekrar girin" required>
        </div>
        <button type="submit" class="btn btn-warning w-100 shadow-sm">Kayıt Ol</button>
    </form>

    <div class="mt-4 small text-muted">
        Zaten hesabınız var mı? <a href="/login" class="text-decoration-none">Giriş Yap</a>
    </div>
</div>
</body>
</html>
