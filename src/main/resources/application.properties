# PostgreSQL Ba?lant? Bilgileri
spring.datasource.url=jdbc:postgresql://localhost:5432/filmArsiviDB
spring.datasource.username=postgres
spring.datasource.password=227688

# JPA / Hibernate Ayarlar? (Tablolar?n otomatik olu?mas?n? sa?lar)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
